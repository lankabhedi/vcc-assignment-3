<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#333">
    Auto-Scaling Architecture: Local VM to GCP Cloud
  </text>
  <text x="500" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#666">
    Samnit Mehandiratta (M25AI2087), IIT Jodhpur - VCC Assignment 3
  </text>
  
  <!-- Local VM Section -->
  <rect x="50" y="100" width="350" height="380" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
  <text x="225" y="130" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">
    Local VM (VirtualBox)
  </text>
  
  <!-- Alpine Linux Box -->
  <rect x="80" y="150" width="290" height="80" fill="#ffffff" stroke="#42a5f5" stroke-width="2" rx="5"/>
  <text x="225" y="175" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Alpine Linux</text>
  <text x="225" y="195" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Lightweight OS (~60MB)</text>
  <text x="225" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Python3, SSH enabled</text>
  
  <!-- Sample App Box -->
  <rect x="80" y="250" width="290" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="225" y="275" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Sample Web Server</text>
  <text x="225" y="295" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Port 8080, /health endpoint</text>
  
  <!-- Monitor Box -->
  <rect x="80" y="330" width="290" height="60" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/>
  <text x="225" y="355" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Resource Monitor</text>
  <text x="225" y="375" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">CPU/RAM check every 5s</text>
  
  <!-- Threshold Box -->
  <rect x="80" y="410" width="290" height="50" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
  <text x="225" y="430" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">
    Threshold: CPU/RAM &gt; 75%
  </text>
  <text x="225" y="450" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">
    3 consecutive triggers required
  </text>
  
  <!-- GCP Cloud Section -->
  <rect x="600" y="100" width="350" height="380" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="10"/>
  <text x="775" y="130" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#2e7d32">
    Google Cloud Platform
  </text>
  
  <!-- GCP Auth Box -->
  <rect x="630" y="150" width="290" height="50" fill="#ffffff" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="775" y="170" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">gcloud CLI / API</text>
  <text x="775" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Authentication &amp; Project Config</text>
  
  <!-- Compute Engine Box -->
  <rect x="630" y="220" width="290" height="80" fill="#ffffff" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="775" y="245" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Compute Engine VM</text>
  <text x="775" y="265" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">e2-medium instance</text>
  <text x="775" y="285" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Debian 11, Auto-assigned IP</text>
  
  <!-- Instance Group Box -->
  <rect x="630" y="320" width="290" height="70" fill="#f1f8e9" stroke="#689f38" stroke-width="2" rx="5"/>
  <text x="775" y="345" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Managed Instance Group</text>
  <text x="775" y="365" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Min: 1, Max: 5 instances</text>
  <text x="775" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Auto-scaling policy: 75% CPU</text>
  
  <!-- Arrow from Local to GCP -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f57c00"/>
    </marker>
  </defs>
  
  <!-- Scaling Trigger Arrow -->
  <path d="M 400 290 L 450 290 L 450 290 L 600 290" 
        stroke="#f57c00" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="500" y="275" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">
    SCALE TRIGGER
  </text>
  <text x="500" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#f57c00">
    (gcloud API call)
  </text>
  
  <!-- Monitoring Flow Arrow (internal) -->
  <path d="M 225 390 L 225 410" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- App to Monitor Arrow -->
  <path d="M 225 310 L 225 330" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Flow Steps at Bottom -->
  <rect x="50" y="520" width="900" height="150" fill="#fff" stroke="#ddd" stroke-width="2" rx="10"/>
  <text x="500" y="550" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">
    Implementation Flow
  </text>
  
  <!-- Step 1 -->
  <circle cx="120" cy="590" r="25" fill="#1976d2"/>
  <text x="120" y="595" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">1</text>
  <text x="120" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Create Local VM</text>
  <text x="120" y="645" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(VirtualBox + Alpine)</text>
  
  <!-- Step 2 -->
  <circle cx="280" cy="590" r="25" fill="#ff9800"/>
  <text x="280" y="595" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">2</text>
  <text x="280" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Deploy App</text>
  <text x="280" y="645" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(Web Server)</text>
  
  <!-- Step 3 -->
  <circle cx="440" cy="590" r="25" fill="#e91e63"/>
  <text x="440" y="595" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">3</text>
  <text x="440" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Monitor Resources</text>
  <text x="440" y="645" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(CPU/RAM &gt;75%)</text>
  
  <!-- Step 4 -->
  <circle cx="600" cy="590" r="25" fill="#4caf50"/>
  <text x="600" y="595" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">4</text>
  <text x="600" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Trigger Auto-Scale</text>
  <text x="600" y="645" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(gcloud API)</text>
  
  <!-- Step 5 -->
  <circle cx="760" cy="590" r="25" fill="#9c27b0"/>
  <text x="760" y="595" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">5</text>
  <text x="760" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Cloud VM Created</text>
  <text x="760" y="645" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(GCP Compute)</text>
  
  <!-- Step 6 -->
  <circle cx="920" cy="590" r="25" fill="#00bcd4"/>
  <text x="920" y="595" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">6</text>
  <text x="920" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Load Distributed</text>
  <text x="920" y="645" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">(Scaling Complete)</text>
  
  <!-- Connecting lines between steps -->
  <line x1="145" y1="590" x2="255" y2="590" stroke="#ddd" stroke-width="2"/>
  <line x1="305" y1="590" x2="415" y2="590" stroke="#ddd" stroke-width="2"/>
  <line x1="465" y1="590" x2="575" y2="590" stroke="#ddd" stroke-width="2"/>
  <line x1="625" y1="590" x2="735" y2="590" stroke="#ddd" stroke-width="2"/>
  <line x1="785" y1="590" x2="895" y2="590" stroke="#ddd" stroke-width="2"/>
  
  <!-- Legend -->
  <rect x="50" y="680" width="200" height="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="60" y="692" font-family="Arial" font-size="10" fill="#333">Local Components</text>
  
  <rect x="200" y="680" width="200" height="15" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="210" y="692" font-family="Arial" font-size="10" fill="#333">Cloud Components</text>
  
  <rect x="400" y="680" width="200" height="15" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="410" y="692" font-family="Arial" font-size="10" fill="#333">Application Layer</text>
  
  <rect x="600" y="680" width="200" height="15" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="610" y="692" font-family="Arial" font-size="10" fill="#333">Monitoring Layer</text>
  
  <rect x="800" y="680" width="150" height="15" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
  <text x="810" y="692" font-family="Arial" font-size="10" fill="#333">Threshold Alert</text>
</svg>
